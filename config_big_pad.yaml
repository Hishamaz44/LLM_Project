# BIG judge tier — padding mode (economical flagship picks).
# Same models/topics as config_big.yaml; content held fixed so only word count grows (the pure
# verbosity-bias test). Prices are input $/M tokens (OpenRouter, 2026-07).
for_debater_model: "deepseek/deepseek-v4-pro"
against_debater_model: "deepseek/deepseek-v4-pro"

homogeneous_judge_model: "x-ai/grok-4.3" # $1.25/M

# GLM 5.2 swapped in for gemini-pro per preference.
heterogeneous_judge_models:
  - "x-ai/grok-4.3" # $1.25/M
  - "deepseek/deepseek-v4-pro" # $0.44/M
  - "z-ai/glm-5.2" # $0.91/M

rounds: 2
length_targets: [60, 120, 180]
length_mode: "pad"
debater_max_tokens: 4000
debater_temperature: 0.2
judge_max_tokens: 4000
judge_temperature: 0.7
