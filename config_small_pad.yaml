# SMALL judge tier — padding mode.
# Same models/topics as config_small.yaml, but the shortest argument is written once and expanded
# to the longer lengths WITHOUT adding content. Whatever length score-climb survives here (vs the
# generate run) is pure verbosity bias. Prices are input $/M tokens (OpenRouter, 2026-07).
for_debater_model: "openai/gpt-5.4-mini"
against_debater_model: "openai/gpt-5.4-mini"

homogeneous_judge_model: "google/gemini-3.1-flash-lite" # $0.25/M

# Heterogeneous panel: 3 DISTINCT small models from 3 providers (pinned IDs).
heterogeneous_judge_models:
  - "google/gemini-3.1-flash-lite" # $0.25/M
  - "openai/gpt-5.4-mini" # $0.75/M
  - "anthropic/claude-haiku-4.5" # $1/M

rounds: 2
length_targets: [60, 120, 180]
length_mode: "pad"
debater_max_tokens: 2000
debater_temperature: 0.2
judge_max_tokens: 2000
judge_temperature: 0.7
