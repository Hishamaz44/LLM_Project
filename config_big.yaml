# BIG judge tier — generate mode (economical flagship picks).
# Debaters are the fixed pair used across every tier; only the judge panel changes here.
# These are the cheaper frontier models so the big tier stays affordable. Prices are input
# $/M tokens (OpenRouter, 2026-07).
for_debater_model: "deepseek/deepseek-v4-pro"
against_debater_model: "deepseek/deepseek-v4-pro"

# Homogeneous panel: one big model, called 3× (independent samples via slot markers).
homogeneous_judge_model: "x-ai/grok-4.3" # $1.25/M

# Heterogeneous panel: 3 DISTINCT big models from 3 providers (GLM 5.2 swapped in for gemini-pro).
heterogeneous_judge_models:
  - "x-ai/grok-4.3" # $1.25/M
  - "deepseek/deepseek-v4-pro" # $0.44/M
  - "z-ai/glm-5.2" # $0.91/M

rounds: 2
length_targets: [60, 120, 180]
length_mode: "generate"
debater_max_tokens: 4000
debater_temperature: 0.2
judge_max_tokens: 4000
judge_temperature: 0.7
